<!DOCTYPE html>
<html>
<head>
    <title>Gestionnaire de tâches</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        form {
            margin: 20px;
        }
        input {
            padding: 10px;
            width: 250px;
        }
        button {
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            display: flex;
            justify-content: space-between;
        }
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>📋 Gestionnaire de tâches</h1>

<form action="/add" method="POST">
    <input type="text" name="task" placeholder="Nouvelle tâche..." required>
    <button type="submit">Ajouter</button>
</form>

<!-- Bouton export -->
<a href="/export">
    <button type="button" style="background:#2196F3;">Exporter en CSV</button>
</a>

<ul>
<input type="text" id="search" placeholder="Rechercher une tâche..." onkeyup="searchTask()" style="padding:10px; width:250px;">

    <table border="1" style="margin:auto; background:white;">
<tr>
<th>ID</th>
<th>Tâche</th>
<th>Action</th>
</tr>

{% for task in tasks %}
<tr>
<td>{{ task[0] }}</td>
<td>{{ task[1] }}</td>
<td>
<a href="/delete/{{ task[0] }}" style="color:red;">Supprimer</a>
</td>
</tr>
{% endfor %}

</table>
<script>
function searchTask() {
  let input = document.getElementById("search");
  let filter = input.value.toLowerCase();
  let table = document.querySelector("table");
  let tr = table.getElementsByTagName("tr");

  for (let i = 1; i < tr.length; i++) {
    let td = tr[i].getElementsByTagName("td")[1];
    if (td) {
      let txtValue = td.textContent || td.innerText;
      tr[i].style.display = txtValue.toLowerCase().includes(filter) ? "" : "none";
    }
  }
}
</script>
</body>
</html>
<a href="/export_excel">
<button style="background:green;">Exporter en Excel</button>
</a>
