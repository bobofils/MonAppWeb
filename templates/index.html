<!DOCTYPE html>
<html>
<head>
<title>Gestionnaire de tâches</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
}

table{
margin:auto;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

button{
padding:10px;
margin:5px;
border:none;
color:white;
cursor:pointer;
}

.add{background:#4CAF50;}
.csv{background:#2196F3;}
.excel{background:#2e7d32;}
</style>

</head>
<body>

<h1>📋 Gestionnaire de tâches</h1>

<form action="/add" method="POST">
<input type="text" name="task" placeholder="Nouvelle tâche..." required>
<button class="add">Ajouter</button>
</form>

<br>

<input type="text" id="search" placeholder="Rechercher une tâche..." onkeyup="searchTask()">

<br><br>

<a href="/export">
<button class="csv">Exporter CSV</button>
</a>

<a href="/export_excel">
<button class="excel">Exporter Excel</button>
</a>

<a href="/stats">
<button style="background:orange;">Voir statistiques</button>
</a>

<br><br>

<table id="taskTable">

<tr>
<th>ID</th>
<th>Tâche</th>
<th>Action</th>
</tr>

{% for task in tasks %}
<tr>
<td>{{ task[0] }}</td>
<td>{{ task[1] }}</td>
<td>
<a href="/delete/{{ task[0] }}" style="color:red;">Supprimer</a>
</td>
</tr>
{% endfor %}

</table>

<script>
function searchTask(){
let input=document.getElementById("search");
let filter=input.value.toLowerCase();
let table=document.getElementById("taskTable");
let tr=table.getElementsByTagName("tr");

for(let i=1;i<tr.length;i++){
let td=tr[i].getElementsByTagName("td")[1];
if(td){
let txt=td.textContent || td.innerText;
tr[i].style.display=txt.toLowerCase().includes(filter)?"":"none";
}
}
}
</script>

</body>
</html>
